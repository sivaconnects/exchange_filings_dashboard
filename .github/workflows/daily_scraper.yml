name: Exchange Filings Scraper

on:
  schedule:
    # Every 5 min during NSE/BSE trading + post-market window
    # 3:30 AM – 12:30 PM UTC  =  9:00 AM – 6:00 PM IST  (Mon–Fri)
    - cron: '*/5 3-12 * * 1-5'
    # Evening window: catch late filings up to 9 PM IST
    - cron: '*/15 13-15 * * 1-5'
    # Saturday: 3 runs for SME / delayed filings
    - cron: '0 4,6,8 * * 6'

  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full re-scrape (clears dedup state)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Only one scraper run at a time — queue extras, never cancel
concurrency:
  group: scraper-run
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      # ── 3. Dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt -q

      # ── 4. Scrape ──────────────────────────────────────────────────
      - name: Run Exchange Filings Scraper
        id: scraper
        run: |
          cd scrapers
          python main.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}

      # ── 5. Stage + detect changes ──────────────────────────────────
      - name: Stage data files
        id: stage
        run: |
          git add data/ docs/data.json || true
          CHANGED=$(git diff --cached --name-only | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "Staged files changed: $CHANGED"
          git diff --cached --name-only

      # ── 6. Commit (only if something changed) ─────────────────────
      - name: Commit new data
        if: steps.stage.outputs.changed > 0
        run: |
          git config --local user.email "filings-bot@github-actions"
          git config --local user.name "Exchange Filings Bot"
          git commit -m "📊 Filings — $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Deploy to GitHub Pages ──────────────────────────────────
      - name: Deploy to GitHub Pages
        if: steps.stage.outputs.changed > 0
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          commit_message: "🌐 Dashboard — $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"

      # ── 8. Job summary ─────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "## Exchange Filings Run" >> $GITHUB_STEP_SUMMARY
          echo "**Time (IST):** $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "**Changed files:** ${{ steps.stage.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          if [ -f docs/data.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          try:
              d = json.load(open('docs/data.json'))
              s = d.get('stats', {})
              print(f'| NSE Filings | {s.get(\"nse_filings\", 0)} |')
              print(f'| BSE Filings | {s.get(\"bse_filings\", 0)} |')
              print(f'| Opportunities | {s.get(\"opportunities_found\", 0)} |')
              print(f'| High Opps | {s.get(\"high_opportunity_count\", 0)} |')
              print(f'| Insights | {s.get(\"insights_generated\", 0)} |')
          except Exception as e:
              print(f'| Error | {e} |')
            " >> $GITHUB_STEP_SUMMARY || true
          fi
